services:
  - type: web
    name: noboghat-backend
    runtime: java
    buildCommand: cd backend && ./mvnw clean package -DskipTests
    startCommand: java -jar backend/target/mahi-0.0.1-SNAPSHOT.jar
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: noboghat-mysql
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: noboghat-mysql
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: noboghat-mysql
          property: password
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: validate
      - key: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID
        value: ${GOOGLE_CLIENT_ID}
      - key: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET
        value: ${GOOGLE_CLIENT_SECRET}
      - key: JWT_SECRET
        value: ${JWT_SECRET}
    disk:
      name: noboghat-data
      mountPath: /data
      sizeGB: 1
    region: oregon

  - type: staticSite
    name: noboghat-frontend
    staticPublishPath: ./frontend
    buildCommand: echo "Static files ready"
    region: oregon
    envVars:
      - key: BACKEND_API_URL
        value: https://noboghat-backend.onrender.com

databases:
  - name: noboghat-mysql
    databaseName: noboghat
    user: noboghat_user
    region: oregon
    plan: free

env:
  - key: GOOGLE_CLIENT_ID
    sync: false
  - key: GOOGLE_CLIENT_SECRET
    sync: false
  - key: JWT_SECRET
    sync: false
